<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      height: fit-content;
    }
    h1 { color: #1a1a2e; font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 28px; font-size: 0.9rem; }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus { border-color: #4f46e5; }
    button {
      padding: 12px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    .task-list { list-style: none; }
    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fafafa;
    }
    .task-title { font-size: 0.95rem; color: #333; }
    .task-meta { font-size: 0.75rem; color: #999; margin-top: 3px; }
    .delete-btn {
      background: #fee2e2;
      color: #dc2626;
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 6px;
    }
    .delete-btn:hover { background: #fecaca; }
    .empty { text-align: center; color: #999; padding: 32px 0; }
    #status { text-align: center; color: #4f46e5; margin-bottom: 12px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Task Manager</h1>
    <p class="subtitle">Powered by Node.js + Redis + Kubernetes</p>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Enter a new task..." />
      <button onclick="addTask()">Add Task</button>
    </div>
    <div id="status"></div>
    <ul class="task-list" id="taskList"></ul>
  </div>

  <script>
    const API = '/api';

    async function loadTasks() {
      const res = await fetch(`${API}/tasks`);
      const tasks = await res.json();
      const list = document.getElementById('taskList');
      if (tasks.length === 0) {
        list.innerHTML = '<p class="empty">No tasks yet. Add one above!</p>';
        return;
      }
      list.innerHTML = tasks.map(t => `
        <li class="task-item">
          <div>
            <div class="task-title">${escapeHtml(t.title)}</div>
            <div class="task-meta">${new Date(t.createdAt).toLocaleString()}</div>
          </div>
          <button class="delete-btn" onclick="deleteTask('${t.id}')">Delete</button>
        </li>
      `).join('');
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return;
      setStatus('Adding task...');
      await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      setStatus('');
      loadTasks();
    }

    async function deleteTask(id) {
      setStatus('Deleting...');
      await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      setStatus('');
      loadTasks();
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(text));
      return d.innerHTML;
    }

    document.getElementById('taskInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
